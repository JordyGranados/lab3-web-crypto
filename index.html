<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Práctica de cifrado y descifrado AES con CryptoJS - TC3005B" />
    <title>Hash · Cipher · Decipher — TC3005B</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="header">
      <span class="header-title">CryptoLab</span>
      <span class="header-course">TC3005B · Tec de Monterrey</span>
    </header>

    <main class="main">
      <div class="page-title">
        <h1>Cipher / Decipher</h1>
        <p>Cifrado simétrico AES con <code>crypto-js</code></p>
      </div>

      <div class="form-grid">

        <!-- Columna izquierda: entrada -->
        <section class="panel">
          <h2 class="panel-title">Entrada</h2>

          <div class="field">
            <label for="plaintext-input">Texto plano</label>
            <textarea
              id="plaintext-input"
              placeholder="Escribe el mensaje a cifrar..."
              rows="5"
              spellcheck="false"
            ></textarea>
          </div>

          <div class="field">
            <label for="secret-key-input">Llave secreta</label>
            <div class="input-row">
              <input
                type="password"
                id="secret-key-input"
                placeholder="Llave secreta"
                value="12345678"
              />
              <button class="btn-icon" id="toggle-key-btn" title="Mostrar / Ocultar llave">
                Mostrar
              </button>
            </div>
          </div>

          <button class="btn btn-primary" id="btn-cifrar">Cifrar</button>
        </section>

        <!-- Columna derecha: resultados -->
        <section class="panel">
          <h2 class="panel-title">Resultados</h2>

          <div class="field">
            <label>Texto cifrado</label>
            <div class="result-box" id="cipher-output-box">
              <p class="placeholder-text" id="cipher-placeholder">El texto cifrado aparecerá aquí.</p>
              <p class="result-text mono" id="cipher-output" hidden></p>
            </div>
            <button class="btn-link" id="copy-cipher-btn" hidden>Copiar texto cifrado</button>
          </div>

          <div class="field">
            <label for="cipher-input-decrypt">Texto cifrado para descifrar</label>
            <textarea
              id="cipher-input-decrypt"
              class="mono"
              placeholder="Pega aquí el texto cifrado..."
              rows="3"
              spellcheck="false"
            ></textarea>
          </div>

          <button class="btn btn-secondary" id="btn-descifrar">Descifrar</button>

          <div class="field" style="margin-top: 16px;">
            <label>Texto original descifrado</label>
            <div class="result-box" id="decipher-output-box">
              <p class="placeholder-text" id="decipher-placeholder">El texto descifrado aparecerá aquí.</p>
              <p class="result-text" id="decipher-output" hidden></p>
            </div>
            <button class="btn-link" id="copy-decipher-btn" hidden>Copiar texto descifrado</button>
          </div>

          <div class="status-row" id="status-row" hidden>
            <span class="status-dot" id="status-dot"></span>
            <span class="status-msg" id="status-msg"></span>
          </div>
        </section>

      </div>
    </main>

    <footer class="footer">
      TC3005B · Tecnológico de Monterrey · 2025
    </footer>

    <div class="toast" id="toast"></div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
